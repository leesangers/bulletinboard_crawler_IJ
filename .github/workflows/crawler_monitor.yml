name: Bulletin Board Crawler Service

on:
  schedule:
    - cron: '31 1 * * *' # 10:31 AM KST
    - cron: '13 6 * * *' # 15:13 PM KST
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Monitor
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python main.py

      # Using [skip ci] logic to avoid infinite loops on push
      - name: Commit and Push last_ids.json
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add last_ids.json
          git commit -m "Update last_ids.json [skip ci]" || echo "No changes to commit"
          git pull --rebase origin main
          git push
