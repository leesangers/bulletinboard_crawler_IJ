name: Daily Bulletin Board Monitor

on:
  schedule:
    # Run at 08:00 KST (23:00 UTC) every day
    - cron: '0 23 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write # To commit last_id.txt updates

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run bulletin board monitor
      env:
        EMAIL_USER: ${{ secrets.EMAIL_USER }}
        EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
        RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
      run: python main.py

    - name: Commit and push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        if [ -f last_id.txt ]; then
          git add last_id.txt
          git commit -m "Update last_id.txt [skip ci]" || echo "No changes to commit"
          git push
        fi
